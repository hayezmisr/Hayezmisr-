<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحيز العمراني لمحافظة سوهاج</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
height:100%;
}

#map{
width:100%;
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([26.56,31.70],9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

fetch('احوذه مدن ونجوع وقري محافظة سوهاج.mxd.json')
.then(res=>res.json())
.then(data=>{

L.geoJSON(data,{
style:{
color:'red',
weight:2,
fillOpacity:0.2
}
}).addTo(map);

});
// ===== البحث بالإحداثيات =====

var coordBox=L.control({position:'topright'});

coordBox.onAdd=function(){

var div=L.DomUtil.create('div');

div.style.background="white";
div.style.padding="8px";
div.style.borderRadius="6px";
div.style.boxShadow="0 0 6px gray";

div.innerHTML=`
<input id="coords"
placeholder="26.564321,31.703245"
style="width:200px;padding:6px;"><br><br>

<button onclick="searchCoord()"
style="width:100%;padding:6px;background:green;color:white;border:none;">
بحث بالإحداثيات
</button>
`;

return div;

};

coordBox.addTo(map);

function searchCoord(){

var txt=document.getElementById("coords").value.trim();

var arr=txt.split(",");

if(arr.length!=2){

alert("اكتب الإحداثيات بهذا الشكل:\n26.564321,31.703245");

return;

}

var lat=parseFloat(arr[0]);
var lng=parseFloat(arr[1]);

if(isNaN(lat)||isNaN(lng)){

alert("الإحداثيات غير صحيحة");

return;

}

map.setView([lat,lng],18);

L.marker([lat,lng])
.addTo(map)
.bindPopup("الموقع المحدد")
.openPopup();
test.style.top=
} 
  var test=document.createElement("div");

test.style.position="absolute";
test.style.top="10px";
test.style.right="10px";
test.style.zIndex="9999";
test.style.background="white";
test.style.padding="10px";

test.innerHTML="أنا ظاهر";

document.body.appendChild(test);
  L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
{
attribution:'&copy; OpenStreetMap &copy; CARTO',
subdomains:'abcd',
maxZoom:20
}
).addTo(map);
</script>

</body>
  </html>
