<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحيز العمراني لمحافظة سوهاج</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
height:100%;
}

#map{
width:100%;
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([26.56,31.70],9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

fetch('احوذه مدن ونجوع وقري محافظة سوهاج.mxd.json')
.then(res=>res.json())
.then(data=>{

L.geoJSON(data,{
style:{
color:'red',
weight:2,
fillOpacity:0.2
}
}).addTo(map);

});

</script>

</body>
  </html>
